<h3>Product Management</h3>
<div class="container mt-4">
<div class="card-header bg-dark text-white">
        <h4 class="mb-0">{{ isEditMode ? 'Edit Product' : 'Add Product' }}</h4>
    </div>

    <div class="card-body">

        <form [formGroup]="form" (ngSubmit)= "create()">

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label>Name</label>

                    <input
                        class="form-control"
                        formControlName="productName">

                </div>

                <div class="col-md-6 mb-3">

                    <label>Type</label>

                    <select
                        class="form-select"
                        formControlName="productType">

                        <option [ngValue]="0">Health</option>
                        <option [ngValue]="1">Motor</option>
                        <option [ngValue]="2">Life</option>
                        <option [ngValue]="3">Travel</option>

                    </select>

                </div>

            </div>

            <div class="mb-3">

                <label>Description</label>

                <textarea
                    rows="3"
                    class="form-control"
                    formControlName="description">
                </textarea>

            </div>

            <div class="form-check mb-3">

                <input
                    class="form-check-input"
                    type="checkbox"
                    formControlName="isActive">

                <label class="form-check-label">
                    Active
                </label>

            </div>

            <button
                class="btn btn-success me-2"
                type="submit">

                {{ isEditMode ? 'Update' : 'Add' }}

            </button>

            <button
                type="button"
                class="btn btn-secondary"
                (click)="resetForm()">

                Cancel

            </button>

        </form>

    </div>
</div>

<select class="form-select" [(ngModel)]="ProductType">
    <option [ngValue]="0">Health</option>
    <option [ngValue]="1">Motor</option>
    <option [ngValue]="2">Life</option>
    <option [ngValue]="3">Travel</option>
</select>

<table class="table table-bordered ">

    <thead class="table-dark">

        <tr>
            <th>ID</th>

            <th>Name</th>

            <th>Type</th>

            <th>Description</th>

            <th>Status</th>

            <th>Action</th>

        </tr>

    </thead>

    <tbody>

        <tr *ngFor="let p of products()">
            <td>{{p.productId}}</td>

            <td>{{p.productName}}</td>

            <td>{{p.productType}}</td>

            <td>{{p.description}}</td>

            <td>

                <span
                    class="badge"
                    [class.bg-success]="p.isActive"
                    [class.bg-danger]="!p.isActive">

                    {{p.isActive ? 'Active' : 'Inactive'}}

                </span>

            </td>

            <td>
                <button
                    class="btn btn-primary btn-sm"
                    (click)="edit(p)">
                    Edit
                </button>
                <button
                    class="btn btn-danger btn-sm ms-2"
                    (click)="delete(p.productId)">
                    Deactivate
                </button>
            </td>

        </tr>

    </tbody>

</table>
